<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Golf Analytics AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111827;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    min-height: 100vh;
    width: 100%;
    height: 100%;
  }

  html {
    background: #111827;
    width: 100%;
    height: 100%;
    color-scheme: dark;
  }

  /* ── Floating Action Button ── */
  #fab {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 62px; height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff; font-size: 28px; border: none; cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    pointer-events: auto;
    transition: transform .2s, box-shadow .2s;
  }
  #fab:hover { transform: scale(1.1); box-shadow: 0 10px 30px rgba(0,0,0,.6); }

  #badge {
    position: absolute; top: -3px; right: -3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #ef4444; color: #fff;
    font-size: 10px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }

  /* ── Chat window ── */
  #win {
    position: fixed;
    bottom: 104px; right: 28px;
    width: 370px; height: 520px;
    background: #111827;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.75);
    display: none; flex-direction: column;
    overflow: hidden;
    border: 1px solid #374151;
    z-index: 9998;
    pointer-events: auto;
  }
  #win.open { display: flex; animation: slideIn .2s ease; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1);   }
  }

  /* header */
  #head {
    background: linear-gradient(135deg, #16a34a, #15803d);
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #head-left { display: flex; align-items: center; gap: 9px; }
  #avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #title { color: #fff; font-weight: 700; font-size: 14px; }
  #sub   { color: rgba(255,255,255,.75); font-size: 11px; margin-top: 1px; }
  #cls-btn {
    background: none; border: none;
    color: rgba(255,255,255,.85); font-size: 18px;
    cursor: pointer; padding: 2px 7px; border-radius: 5px;
    transition: background .15s; line-height: 1;
  }
  #cls-btn:hover { background: rgba(255,255,255,.2); }

  /* messages */
  #msgs {
    flex: 1; overflow-y: auto;
    padding: 12px 11px;
    display: flex; flex-direction: column; gap: 9px;
    scroll-behavior: smooth;
  }
  #msgs::-webkit-scrollbar { width: 3px; }
  #msgs::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

  .msg {
    max-width: 87%; padding: 9px 13px; border-radius: 14px;
    font-size: 13px; line-height: 1.55; word-break: break-word;
    animation: fadeUp .15s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0);   }
  }
  .msg.bot  {
    background: #1f2937; color: #e5e7eb;
    border-bottom-left-radius: 3px; align-self: flex-start;
  }
  .msg.user {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff; border-bottom-right-radius: 3px;
    align-self: flex-end; text-align: right;
  }
  .msg.typ  {
    background: #1f2937; color: #6b7280;
    align-self: flex-start; font-style: italic; font-size: 12px;
  }

  /* ── Markdown table rendering ── */
  .msg.bot table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 6px;
    font-size: 12px;
  }
  .msg.bot th {
    background: #374151;
    color: #d1fae5;
    padding: 5px 8px;
    text-align: left;
    font-weight: 600;
    border: 1px solid #4b5563;
  }
  .msg.bot td {
    padding: 4px 8px;
    border: 1px solid #374151;
    color: #e5e7eb;
  }
  .msg.bot tr:nth-child(even) td { background: #1a2332; }
  .msg.bot tr:hover td { background: #243040; }

  /* ── Inline formatting ── */
  .msg.bot strong { color: #86efac; }
  .msg.bot em     { color: #a5b4fc; font-style: italic; }
  .msg.bot code   {
    background: #374151; color: #fbbf24;
    padding: 1px 5px; border-radius: 4px; font-size: 11px;
  }
  /* quick-question chips */
  #chips {
    padding: 0 11px 9px;
    display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0;
  }
  .chip {
    background: #1f2937; color: #9ca3af;
    border: 1px solid #374151; border-radius: 18px;
    padding: 4px 11px; font-size: 11px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .chip:hover { background: #16a34a; color: #fff; border-color: #16a34a; }

  /* input bar */
  #bar {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 11px;
    background: #1f2937; border-top: 1px solid #374151; flex-shrink: 0;
  }
  #inp {
    flex: 1; background: #111827;
    border: 1px solid #374151; border-radius: 20px;
    color: #f3f4f6; font-size: 13px;
    padding: 8px 14px; outline: none;
    transition: border-color .15s;
  }
  #inp:focus { border-color: #16a34a; }
  #inp::placeholder { color: #6b7280; }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none; color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform .15s, opacity .15s;
  }
  #send-btn:hover    { transform: scale(1.1); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<!-- Floating Action Button -->
<button id="fab" title="Golf Analytics AI">
  ⛳<span id="badge">1</span>
</button>

<!-- Chat window -->
<div id="win">
  <div id="head">
    <div id="head-left">
      <div id="avatar">🤖</div>
      <div>
        <div id="title">Golf Analytics AI</div>
        <div id="sub">Prices · Availability · Market Rates</div>
      </div>
    </div>
    <button id="cls-btn" title="Close">✕</button>
  </div>

  <div id="msgs">
    <div class="msg bot">
      👋 Hi! I'm your Golf Analytics Assistant.<br><br>
      Ask me anything about tee time prices, availability, occupancy, or market rates.
    </div>
  </div>

  <div id="chips">
    <button class="chip" data-q="Average price for stonegate golf club?">💰 Stonegate price</button>
    <button class="chip" data-q="Which course has the highest occupancy?">📈 Top occupancy</button>
    <button class="chip" data-q="Available tee times on GolfNow?">🟢 GolfNow slots</button>
    <button class="chip" data-q="Compare prices across all courses">📊 Compare courses</button>
  </div>

  <div id="bar">
    <input id="inp" type="text" placeholder="Ask about golf data…" autocomplete="off"/>
    <button id="send-btn" title="Send">&#10148;</button>
  </div>
</div>

<script>
  var API    = 'http://localhost:8001/chat';
  var isOpen = false;
  var busy   = false;

  var fab     = document.getElementById('fab');
  var win     = document.getElementById('win');
  var badge   = document.getElementById('badge');
  var msgs    = document.getElementById('msgs');
  var chips   = document.getElementById('chips');
  var inp     = document.getElementById('inp');
  var sendBtn = document.getElementById('send-btn');
  var clsBtn  = document.getElementById('cls-btn');

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    badge.style.display = 'none';
    if (isOpen) setTimeout(function() { inp.focus(); }, 60);
  }

  function mdToHtml(text) {
    // Convert markdown pipe tables
    var lines = text.split('\n');
    var out = [];
    var i = 0;
    while (i < lines.length) {
      var line = lines[i];
      // Detect table: line starts and ends with |
      if (/^\s*\|/.test(line)) {
        var tableLines = [];
        while (i < lines.length && /^\s*\|/.test(lines[i])) {
          tableLines.push(lines[i]);
          i++;
        }
        // Build HTML table
        var html = '<table>';
        var isHeader = true;
        tableLines.forEach(function(tl) {
          // Skip separator rows like |---|---|
          if (/^\s*\|[\s\-|:]+\|\s*$/.test(tl)) { isHeader = false; return; }
          var cells = tl.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|');
          var tag = isHeader ? 'th' : 'td';
          html += '<tr>' + cells.map(function(c) {
            return '<' + tag + '>' + inlineFormat(c.trim()) + '</' + tag + '>';
          }).join('') + '</tr>';
          if (isHeader) isHeader = false;
        });
        html += '</table>';
        out.push(html);
      } else {
        out.push(inlineFormat(line));
        i++;
      }
    }
    return out.join('<br>');
  }

  function inlineFormat(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`(.+?)`/g,       '<code>$1</code>');
  }

  function addMsg(html, cls) {
    var d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.innerHTML = html;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  function send() {
    if (busy) return;
    var q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    addMsg(q, 'user');
    chips.style.display = 'none';
    var typing = addMsg('⛳ Thinking…', 'typ');
    busy = true;
    sendBtn.disabled = true;

    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, top_k: 8 })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      typing.remove();
      addMsg(mdToHtml(data.answer), 'bot');
    })
    .catch(function(err) {
      typing.remove();
      addMsg(
        '⚠️ Cannot reach backend.<br>' +
        'Make sure the FastAPI server is running:<br>' +
        '<code>.venv\\Scripts\\python.exe -m uvicorn backend.app:app --port 8001 --reload</code>',
        'bot'
      );
    })
    .finally(function() {
      busy = false;
      sendBtn.disabled = false;
      inp.focus();
    });
  }

  fab.addEventListener('click', toggle);
  clsBtn.addEventListener('click', toggle);
  sendBtn.addEventListener('click', send);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') send();
  });
  document.querySelectorAll('.chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      inp.value = btn.getAttribute('data-q');
      send();
    });
  });

  // Show notification badge after 1.5 s if chat is still closed
  setTimeout(function() {
    if (!isOpen) badge.style.display = 'flex';
  }, 1500);
</script>
</body>
</html>
